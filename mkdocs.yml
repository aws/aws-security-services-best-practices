site_name: AWS Security Services Best Practices
repo_name: aws/aws-security-services-best-practices
repo_url: https://github.com/aws/aws-security-services-best-practices
docs_dir: 'docs/en'
copyright: 'Copyright &copy; Amazon 2023'
site_author: 'AWS'
site_url: 'https://aws.github.io/aws-security-services-best-practices'
theme:
  name: material
  custom_dir: overrides
  icon:
    repo: fontawesome/brands/github
  features:
    - tabs
    - content.code.copy
    - announce.dismiss
    - header.autohide
  language: en
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: switch to light mode

nav:
  - Home: index.md
  - Amazon Certificate Services Best Practices: guides/certificate-services/index.md
  - Amazon Detective Best Practices: guides/detective/index.md
  - Amazon GuardDuty Best Practices: guides/guardduty/index.md
  - Amazon Inspector Best Practices: guides/inspector/index.md
  - Amazon Macie Best Practices: guides/macie/index.md
  - AWS Security Hub Best Practices: guides/security-hub/index.md
  - AWS Security Hub CSPM Best Practices: guides/security-hub-cspm/index.md
  - Amazon Security Lake Best Practices: guides/security-lake/index.md
  - AWS WAF Best Practices:
      - Home: guides/waf/index.md
      - Prerequisites and Fundamentals: guides/waf/prerequisites/docs/index.md
      - Recommended HTTP Architecture on AWS: guides/waf/recommended-http-architecture/docs/index.md
      - Operationalizing: guides/waf/operationalizing/docs/index.md
      - AWS Managed Rules: guides/waf/aws-managed-rules/docs/index.md
      - Custom Rules: guides/waf/custom-rules/docs/index.md
      - Bot Management: guides/waf/bot-management/docs/index.md
      - Fraud Prevention: guides/waf/fraud-prevention/docs/index.md
      - Recommended WAF Rule Order: guides/waf/recommended-waf-rule-order/docs/index.md
      - CAPTCHA and Challenge: guides/waf/captcha-and-challenge/docs/index.md
      - WAF Costs: guides/waf/waf-cost/docs/index.md
      - Logging Approaches: guides/waf/waf-logging/docs/index.md
      - Monitoring WAF Rules: guides/waf/monitoring-waf-rules/docs/index.md
      - Using WAF with Other AWS Services: guides/waf/using-waf-with-other-services/docs/index.md
      - Additional References: guides/waf/additional-references/docs/index.md
  - AWS Network Firewall Best Practices: guides/network-firewall/index.md
  - Amazon Route 53 Resolver DNS Firewall Best Practices: guides/dns-firewall/index.md
  - Contributors: contributors.md
markdown_extensions:
    - admonition
    - mdx_truly_sane_lists:
        truly_sane: true
        nested_indent: 2
    - toc:
        slugify: !!python/object/apply:pymdownx.slugs.slugify
          kwds:
            case: lower

plugins:
    - i18n:
        docs_structure: suffix
        fallback_to_default: true
        reconfigure_material: true
        reconfigure_search: true
        languages:
          - locale: en
            default: true
            name: English
            build: true
          - locale: ko
            name: 한국어
            build: true
            nav:
              - 홈: index.md
              - AWS Network Firewall 모범 사례: guides/network-firewall/index.md
          - locale: ja
            name: 日本語
            build: true
            nav:
              - ホーム: index.md
              - AWS Network Firewall ベストプラクティス: guides/network-firewall/index.md
              - Amazon Route 53 Resolver DNS Firewall ベストプラクティス: guides/dns-firewall/index.md
    - search
